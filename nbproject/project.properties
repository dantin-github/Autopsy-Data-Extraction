# NetBeans module project for Case Data Extract (Autopsy plugin)
# 在 NetBeans 中需通过 "Libraries" -> "Module Dependencies" 添加平台并依赖 Autopsy-Core、Lookup API
# 或在此指定 platform 路径（根据本机 Autopsy 安装位置修改）
# platform.active=default_platform
# platform.default_platform=C:\\Program Files\\Autopsy\\platform

annotation.processing.enabled=true
annotation.processing.run.all.processors=true
javac.compilerargs=-parameters
javac.source=17
javac.target=17
javac.test.classpath=\
    \${run.test.classpath}
javac.test.sourcepath=\
    \${test.src.dir}
run.test.classpath=\
    \${javac.classpath}:\
    \${build.classes.dir}
run.test.modulepath=\
    \${run.modulepath}
run.test.jvmargs=
run.test.single=true
test.src.dir=test
